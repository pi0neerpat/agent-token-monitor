name: Build macOS Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional GitHub release notes
        required: false
        type: string

jobs:
  build-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run unit tests
        run: swift test
        shell: bash

      - name: Bump patch version
        id: bump-version
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${APP_VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${APP_VERSION}" Info.plist

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Import Apple Developer ID Certificate
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temporary-password"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" \
            "/Library/Keychains/System.keychain" \
            "/System/Library/Keychains/SystemRootCertificates.keychain" \
            $(security list-keychains -d user | sed s/\"//g)

          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > Certificates.p12
          security import Certificates.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/productbuild

          curl -fsSL -o DevIDCA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer || \
          curl -fsSL -o DevIDCA.cer https://www.apple.com/certificateauthority/DeveloperIDCA.cer
          security import DevIDCA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          rm Certificates.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        shell: bash

      - name: Build, sign, notarize, and staple app
        env:
          APP_VERSION: ${{ steps.bump-version.outputs.app_version }}
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
        run: ./release.sh release
        shell: bash

      - name: Verify codesigning and Gatekeeper acceptance
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/Agent Token Monitor.app"
          spctl -a -t open --context context:primary-signature -v "dist/AgentTokenMonitor.dmg"
        shell: bash

      - name: Commit version bump
        env:
          APP_VERSION: ${{ steps.bump-version.outputs.app_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Info.plist

          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
            exit 0
          fi

          git commit -m "Bump version to ${APP_VERSION}"
          git push origin "HEAD:${{ github.ref_name }}"
        shell: bash

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentTokenMonitor-${{ steps.bump-version.outputs.app_version }}-macos
          path: dist/AgentTokenMonitor.dmg

      - name: Create or update GitHub release
        env:
          APP_VERSION: ${{ steps.bump-version.outputs.app_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="v${APP_VERSION}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.txt"
          printf '%s\n' "${{ inputs.release_notes || 'Automated macOS release.' }}" > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; this workflow only creates new releases. Bump the version or delete the existing release."
            exit 1
          fi

          gh release create "$TAG" "dist/AgentTokenMonitor.dmg" \
            --title "Agent Token Monitor ${APP_VERSION}" \
            --notes-file "$NOTES_FILE"
        shell: bash
